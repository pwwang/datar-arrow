name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.9, "3.10", "3.11", "3.12"]
        pyarrow: [
          pyarrow==20.0.0,
          pyarrow==21.0.0,
          pyarrow==22.0.0,
          pyarrow  # lastest
        ]
        exclude:
          - python-version: 3.9
            pyarrow: pyarrow==22.0.0

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --extra all
          # reinstall pyarrow to specific version
          uv pip install -U "$PYARROW"
        env:
          PYARROW: ${{ matrix.pyarrow }}
      - name: Run flake8
        run: uv run flake8 datar_arrow
      - name: Show versions
        run: uv run python -c 'import datar; datar.get_versions()'
      - name: Test with pytest
        run: uv run pytest tests/ --junitxml=junit/test-results-${{ matrix.python-version }}.xml
      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}-${{matrix.pyarrow}}
          path: junit/test-results-${{ matrix.python-version }}-${{matrix.pyarrow}}.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@master
        if: matrix.python-version == 3.12 && github.event_name != 'pull_request'
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: cov.xml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Publish to PyPI
        run: uv build && uv publish --token ${{ secrets.PYPI_PASSWORD }}
        if: success()
